[platformio]
default_envs = r1_hello

# Shared base for all on-device (ESP32-S3) environments. The per-rung envs
# below inherit it via `extends = device`. The native test env does NOT extend
# it, so it isn't saddled with framework=arduino / the M5 deps it can't build.
[device]
platform = espressif32@6.12.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi      ; 8 MB OPI PSRAM on the StickS3
monitor_speed = 115200
monitor_filters = esp32_exception_decoder       ; decode crash backtraces
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1                  ; route Serial to native USB-C
lib_deps =
    m5stack/M5Unified
    bblanchon/ArduinoJson@^7

# One environment per learning rung; build_src_filter compiles only its folder.
[env:r1_hello]
extends = device
build_src_filter = -<*> +<r1_hello/>

[env:r2_screen]
extends = device
build_src_filter = -<*> +<r2_screen/>

[env:r3_buttons]
extends = device
build_src_filter = -<*> +<r3_buttons/>

[env:r4_wifi]
extends = device
build_src_filter = -<*> +<r4_wifi/>

[env:r5_clock]
extends = device
build_src_filter = -<*> +<r5_clock/>

[env:r6_weather]
extends = device
build_src_filter = -<*> +<r6_weather/>

[env:widget]
extends = device
build_src_filter = -<*> +<widget/>

[env:flicker_demo]
extends = device
build_src_filter = -<*> +<flicker_demo/>

[env:r8_lvgl]
extends = device
build_src_filter = -<*> +<r8_lvgl/>
build_flags = ${device.build_flags}
    -DLV_CONF_INCLUDE_SIMPLE     ; LVGL finds include/lv_conf.h via the include path
lib_deps = ${device.lib_deps}
    lvgl/lvgl@^9.2

# Host-side unit tests -- runs on your Mac (no board, no Arduino framework).
# Builds only test/ + lib/weather + ArduinoJson; src/ is skipped during tests.
[env:native]
platform = native
test_framework = unity
lib_deps =
    bblanchon/ArduinoJson@^7
build_flags =
    -std=gnu++17
